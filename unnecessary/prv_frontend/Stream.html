<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LIVE FEED</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="stream.css"/>
</head>
<body>

  <div class="scanline"></div>
  <div class="noise"></div>

  <header>
    <div class="header-left">
      <a href="mission.html" class="back-btn">◀ MISSION CTRL</a>
      <div class="rec-indicator">
        <span class="rec-dot"></span>
        <span>REC</span>
      </div>
    </div>
    <div class="header-center">
      <span class="feed-label">LIVE FEED</span>
      <span class="mission-tag" id="missionTag">MISSION ––––</span>
    </div>
    <div class="header-right">
      <span class="stat-chip" id="detCount">DETECTIONS: 0</span>
      <span class="clock" id="clock">--:--:--</span>
    </div>
  </header>

  <div class="layout">

    <!-- STREAM COLUMN -->
    <div class="stream-col">
      <div class="stream-wrap">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="stream-label">CAM · 01 · YOLO ANNOTATED</div>
        <div class="stream-hud-tl">
          <span id="fps">FPS: --</span>
          <span id="resolution">1280×720</span>
        </div>
        <div class="stream-hud-br">
          <span id="latency">LAT: --ms</span>
        </div>
        <img id="streamImg" src="" alt="stream" />
        <div class="stream-overlay" id="streamOverlay">
          <span>AWAITING SIGNAL</span>
        </div>
      </div>

      <!-- SCAN LINE SWEEP -->
      <div class="sweep"></div>

      <!-- TIMELINE BAR -->
      <div class="timeline">
        <div class="timeline-label">EVENT TIMELINE</div>
        <div class="timeline-track" id="timeline"></div>
      </div>
    </div>

    <!-- DETECTIONS COLUMN -->
    <div class="det-col">
      <div class="det-header">
        <span class="det-title">DETECTIONS</span>
        <span class="det-sub" id="missionSubLabel">MISSION ––––</span>
      </div>

      <div class="det-list" id="detList">
        <div class="det-empty">NO DETECTIONS YET</div>
      </div>

      <div class="det-footer">
        <button class="refresh-btn" onclick="loadDetections()">↻ REFRESH</button>
        <span class="total-label">TOTAL: <span id="totalCount">0</span></span>
      </div>
    </div>

  </div>

  <script src="stream.js"></script>
</body>
</html>
