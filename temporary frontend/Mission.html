<!DOCTYPE html>
<html>
<head>
  <title>Mission</title>
</head>
<body>
  <h1>Live Mission</h1>
  <p>Mission ID: <strong id="missionId"></strong></p>

  <button onclick="stopMission()">Stop Mission</button>
  <p id="status"></p>

  <hr>

  <h2>Live Stream</h2>
  <img src="http://127.0.0.1:8000/stream" width="640" height="480">

  <hr>

  <h2>Detections</h2>
  <div id="detections">No detections yet.</div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const missionId = params.get('mission_id');
    document.getElementById('missionId').innerText = missionId;

    setInterval(fetchDetections, 5000);

    async function fetchDetections() {
      const res = await fetch('http://127.0.0.1:8000/Mission/' + missionId);
      const posts = await res.json();

      const div = document.getElementById('detections');

      if (posts.length === 0) {
        div.innerHTML = 'No detections yet.';
        return;
      }

      let html = '';
      for (const p of posts) {
        html += '<div style="margin-bottom:20px;">';
        html += '<img src="' + p.url + '" width="100" height="100"><br>';
        html += 'Lat: ' + p.latitude + ' | Lng: ' + p.longitude;
        html += '</div>';
      }
      div.innerHTML = html;
    }

    async function stopMission() {
      document.getElementById('status').innerText = 'Stopping...';
      await fetch('http://127.0.0.1:8000/stop_mission', { method: 'POST' });
      document.getElementById('status').innerText = 'Mission stopped.';
    }
  </script>
</body>
</html>
